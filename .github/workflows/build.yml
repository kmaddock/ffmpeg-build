name: Build FFmpeg

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '17 7 * * *'
  workflow_dispatch:

jobs:
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential pkg-config nasm yasm \
            autoconf automake autopoint libtool cmake \
            meson ninja-build python3-setuptools rustc cargo \
            libdrm-dev gettext libudev-dev

      - name: Restore build cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            packages
            workspace
          key: ffmpeg-linux-arm64-${{ github.run_id }}
          restore-keys: |
            ffmpeg-linux-arm64-
            ffmpeg-linux-arm64

      - name: Build ffmpeg
        run: make -j$(nproc) NIGHTLY=1

      - name: Collect failure logs
        if: failure()
        run: |
          mkdir -p failure-logs
          find . -name config.log -exec cp {} failure-logs/ \; || true
          if [ -d "workspace" ]; then
            cp -R workspace failure-logs/workspace
          fi

      - name: Save build cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            packages
            workspace
          key: ffmpeg-linux-arm64-${{ github.run_id }}

      - name: Verify build
        run: |
          ./workspace/bin/ffmpeg -version
          ./workspace/bin/ffprobe -version
          ./workspace/bin/ffmpeg -buildconf
          echo "=== ffmpeg shared libs ==="
          ldd ./workspace/bin/ffmpeg

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp ./workspace/bin/ffmpeg artifacts/
          cp ./workspace/bin/ffprobe artifacts/

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-arm64-build-logs
          path: failure-logs/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-arm64
          path: artifacts/
          retention-days: 14


  build-linux-arm64-shared:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable universe repository
        run: sudo add-apt-repository universe -y

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential pkg-config git nasm yasm \
            libaom-dev libdav1d-dev libsvtav1enc-dev libvpx-dev librav1e-dev \
            libx264-dev libx265-dev libxvidcore-dev \
            libmp3lame-dev libopus-dev libvorbis-dev libtheora-dev libogg-dev \
            libopencore-amrnb-dev libopencore-amrwb-dev \
            libsoxr-dev libzimg-dev libjxl-dev libwebp-dev \
            libfreetype6-dev libzmq3-dev \
            libssl-dev libsrt-openssl-dev \
            libvidstab-dev libzvbi-dev \
            liblilv-dev glslang-tools gettext \
            libdrm-dev libv4l-dev \
            ocl-icd-opencl-dev \
            libudev-dev linux-libc-dev libv4l2rds0

      - name: Clone FFmpeg
        run: git clone --depth 1 https://github.com/Kwiboo/FFmpeg.git ffmpeg-src

      - name: Configure FFmpeg
        run: |
          cd ffmpeg-src
          ./configure \
            --prefix="${GITHUB_WORKSPACE}/install" \
            --enable-shared \
            --disable-static \
            --disable-debug \
            --enable-pthreads \
            --enable-version3 \
            --enable-gpl \
            --enable-libsvtav1 \
            --enable-libvpx \
            --enable-libaom \
            --enable-libzimg \
            --enable-libopencore_amrnb \
            --enable-libopencore_amrwb \
            --enable-libmp3lame \
            --enable-libopus \
            --enable-libvorbis \
            --enable-libtheora \
            --enable-libsoxr \
            --enable-libjxl \
            --enable-libwebp \
            --enable-libfreetype \
            --enable-libzmq \
            --enable-libdav1d \
            --enable-librav1e \
            --enable-openssl \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libxvid \
            --enable-libvidstab \
            --enable-libsrt \
            --enable-libzvbi \
            --enable-lv2 \
            --enable-postproc \
            --disable-ffnvcodec \
            --enable-opencl \
            --enable-v4l2-request \
            --enable-libdrm

      - name: Build FFmpeg
        run: |
          cd ffmpeg-src
          make -j$(nproc)
          make install

      - name: Collect failure logs
        if: failure()
        run: |
          mkdir -p failure-logs
          find ffmpeg-src -name config.log -exec cp {} failure-logs/ \; || true

      - name: Verify build
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/install/lib
        run: |
          ./install/bin/ffmpeg -version
          ./install/bin/ffprobe -version
          ./install/bin/ffmpeg -buildconf
          echo "=== ffmpeg shared libs ==="
          ldd ./install/bin/ffmpeg

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/bin artifacts/lib artifacts/include
          cp install/bin/ffmpeg install/bin/ffprobe artifacts/bin/
          cp -r install/lib/libav* install/lib/libsw* install/lib/libpostproc* artifacts/lib/ 2>/dev/null || true
          cp -r install/lib/pkgconfig artifacts/lib/ 2>/dev/null || true
          cp -r install/include/libav* install/include/libsw* install/include/libpostproc* artifacts/include/ 2>/dev/null || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-arm64-shared-build-logs
          path: failure-logs/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-arm64-shared
          path: artifacts/
          retention-days: 14


  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew install pkg-config nasm yasm autoconf automake libtool cmake meson ninja python-setuptools rust

      - name: Restore build cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            packages
            workspace
          key: ffmpeg-macos-arm64-${{ github.run_id }}
          restore-keys: |
            ffmpeg-macos-arm64-
            ffmpeg-macos-arm64

      - name: Build ffmpeg
        run: make -j$(sysctl -n hw.ncpu) NIGHTLY=1

      - name: Collect failure logs
        if: failure()
        run: |
          mkdir -p failure-logs
          find . -name config.log -exec cp {} failure-logs/ \; || true
          if [ -d "workspace" ]; then
            cp -R workspace failure-logs/workspace
          fi

      - name: Save build cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            packages
            workspace
          key: ffmpeg-macos-arm64-${{ github.run_id }}

      - name: Verify build
        run: |
          ./workspace/bin/ffmpeg -version
          ./workspace/bin/ffprobe -version
          ./workspace/bin/ffmpeg -buildconf
          echo "=== ffmpeg dylibs ==="
          otool -L ./workspace/bin/ffmpeg

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp ./workspace/bin/ffmpeg artifacts/
          cp ./workspace/bin/ffprobe artifacts/

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-build-logs
          path: failure-logs/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-arm64
          path: artifacts/
          retention-days: 14


  publish-nightly:
    needs: [build-linux-arm64, build-linux-arm64-shared, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download linux-arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-linux-arm64
          path: artifacts/linux-arm64

      - name: Download linux-arm64-shared artifacts
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-linux-arm64-shared
          path: artifacts/linux-arm64-shared

      - name: Download macos-arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-macos-arm64
          path: artifacts/macos-arm64

      - name: Prepare release assets
        run: |
          mkdir -p release
          chmod +x artifacts/linux-arm64/ffmpeg artifacts/linux-arm64/ffprobe
          cp artifacts/linux-arm64/ffmpeg release/ffmpeg-linux-arm64
          cp artifacts/linux-arm64/ffprobe release/ffprobe-linux-arm64
          tar -czf release/ffmpeg-linux-arm64-shared.tar.gz -C artifacts/linux-arm64-shared .
          chmod +x artifacts/macos-arm64/ffmpeg artifacts/macos-arm64/ffprobe
          cp artifacts/macos-arm64/ffmpeg release/ffmpeg-macos-arm64
          cp artifacts/macos-arm64/ffprobe release/ffprobe-macos-arm64

      - name: Delete existing nightly release
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish nightly release
        run: |
          gh release create nightly \
            --prerelease \
            --title "Nightly Build" \
            --notes "Built from ${{ github.sha }} · $(date -u '+%Y-%m-%d %H:%M UTC')" \
            release/*
        env:
          GH_TOKEN: ${{ github.token }}

