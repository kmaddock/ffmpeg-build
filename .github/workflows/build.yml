name: Build FFmpeg (macOS ARM)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install \
            aom \
            dav1d \
            fontconfig \
            freetype \
            libgsm \
            harfbuzz \
            libass \
            libbluray \
            libmodplug \
            lame \
            opencore-amr \
            openh264 \
            openjpeg \
            opus \
            rubberband \
            snappy \
            libsoxr \
            speex \
            theora \
            twolame \
            libvidstab \
            libvmaf \
            libvorbis \
            libvpx \
            webp \
            x264 \
            x265 \
            xvid \
            zimg \
            zeromq \
            pkg-config

      - name: Configure FFmpeg
        working-directory: ffmpeg
        run: |
          ./configure \
            --cc=/usr/bin/clang \
            --prefix=/opt/ffmpeg \
            --extra-version=tessus \
            --enable-fontconfig \
            --enable-gpl \
            --enable-libaom \
            --enable-libass \
            --enable-libbluray \
            --enable-libdav1d \
            --enable-libfreetype \
            --enable-libgsm \
            --enable-libharfbuzz \
            --enable-libmodplug \
            --enable-libmp3lame \
            --enable-libopencore-amrnb \
            --enable-libopencore-amrwb \
            --enable-libopenh264 \
            --enable-libopenjpeg \
            --enable-libopus \
            --enable-librubberband \
            --enable-libsnappy \
            --enable-libsoxr \
            --enable-libspeex \
            --enable-libtheora \
            --enable-libtwolame \
            --enable-libvidstab \
            --enable-libvmaf \
            --enable-libvorbis \
            --enable-libvpx \
            --enable-libwebp \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libxml2 \
            --enable-libxvid \
            --enable-libzimg \
            --enable-libzmq \
            --enable-version3 \
            --pkg-config-flags=--static \
            --disable-ffplay

      - name: Build FFmpeg
        working-directory: ffmpeg
        run: make -j$(sysctl -n hw.logicalcpu)

      - name: Install FFmpeg
        working-directory: ffmpeg
        run: sudo make install

      - name: Verify build
        run: |
          /opt/ffmpeg/bin/ffmpeg -version
          /opt/ffmpeg/bin/ffprobe -version

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-arm64
          path: /opt/ffmpeg/bin/
