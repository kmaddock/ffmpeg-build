name: Build FFmpeg (macOS ARM)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install \
            aom \
            dav1d \
            fontconfig \
            freetype \
            libgsm \
            harfbuzz \
            libass \
            libbluray \
            libmodplug \
            lame \
            opencore-amr \
            openh264 \
            openjpeg \
            opus \
            rubberband \
            snappy \
            libsoxr \
            speex \
            theora \
            twolame \
            libvidstab \
            libvmaf \
            libvorbis \
            libvpx \
            webp \
            libxml2 \
            x264 \
            x265 \
            xvid \
            zimg \
            zeromq \
            pkg-config

      - name: Configure FFmpeg
        working-directory: ffmpeg
        run: |
          HOMEBREW_PREFIX="$(brew --prefix)"
          export PKG_CONFIG_PATH="$HOMEBREW_PREFIX/lib/pkgconfig:$HOMEBREW_PREFIX/share/pkgconfig:${PKG_CONFIG_PATH:-}"
          export PKG_CONFIG_ALL_STATIC=1

          CONFIGURE_FLAGS=(
            --cc=/usr/bin/clang
            --prefix=/opt/ffmpeg
            --extra-version=tessus
            --disable-shared
            --enable-static
            --enable-fontconfig
            --enable-gpl
            --enable-libaom
            --enable-libass
            --enable-libdav1d
            --enable-libfreetype
            --enable-libgsm
            --enable-libharfbuzz
            --enable-libmodplug
            --enable-libmp3lame
            --enable-libopencore-amrnb
            --enable-libopencore-amrwb
            --enable-libopenh264
            --enable-libopenjpeg
            --enable-libopus
            --enable-librubberband
            --enable-libsnappy
            --enable-libsoxr
            --enable-libspeex
            --enable-libtheora
            --enable-libtwolame
            --enable-libvidstab
            --enable-libvmaf
            --enable-libvorbis
            --enable-libvpx
            --enable-libwebp
            --enable-libx264
            --enable-libx265
            --enable-libxml2
            --enable-libxvid
            --enable-libzimg
            --enable-libzmq
            --enable-version3
            --pkg-config-flags=--static
            --disable-ffplay
          )

          if pkg-config --exists --print-errors --static libbluray; then
            pkg-config --modversion libbluray
            CONFIGURE_FLAGS+=(--enable-libbluray)
          else
            echo "Static libbluray not available via pkg-config; building without libbluray."
            CONFIGURE_FLAGS+=(--disable-libbluray)
          fi

          ./configure "${CONFIGURE_FLAGS[@]}"

      - name: Build FFmpeg
        working-directory: ffmpeg
        run: make -j$(sysctl -n hw.logicalcpu)

      - name: Install FFmpeg
        working-directory: ffmpeg
        run: sudo make install

      - name: Upload configure log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-config-log
          path: ffmpeg/ffbuild/config.log
          if-no-files-found: warn

      - name: Verify build
        run: |
          /opt/ffmpeg/bin/ffmpeg -version
          /opt/ffmpeg/bin/ffprobe -version
          /opt/ffmpeg/bin/ffmpeg -buildconf | grep -E -- '--enable-static|--disable-shared'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-arm64
          path: /opt/ffmpeg/bin/
