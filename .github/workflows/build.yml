name: Build FFmpeg (macOS ARM)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ffmpeg-static formula (HEAD)
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          brew tap kmaddock/ffmpeg-build .
          brew install --build-from-source --HEAD kmaddock/ffmpeg-build/ffmpeg-static

      - name: Collect failure logs
        if: failure()
        run: |
          mkdir -p failure-logs
          LOG_ROOT="$(brew --cache)/logs"
          if [ -d "$LOG_ROOT/ffmpeg-static" ]; then
            cp -R "$LOG_ROOT/ffmpeg-static" failure-logs/brew-ffmpeg-static
          fi
          find "$LOG_ROOT" -name config.log -exec cp {} failure-logs/ \; || true

      - name: Verify build
        run: |
          FFMPEG_PREFIX="$(brew --prefix ffmpeg-static)"
          "${FFMPEG_PREFIX}/bin/ffmpeg" -version
          "${FFMPEG_PREFIX}/bin/ffprobe" -version
          "${FFMPEG_PREFIX}/bin/ffmpeg" -buildconf | grep -E -- '--enable-static|--disable-shared'

      - name: Prepare artifacts
        run: |
          FFMPEG_PREFIX="$(brew --prefix ffmpeg-static)"
          mkdir -p artifacts
          cp "${FFMPEG_PREFIX}/bin/ffmpeg" artifacts/
          cp "${FFMPEG_PREFIX}/bin/ffprobe" artifacts/

      - name: Discover and bundle runtime dylibs
        run: |
          set -euo pipefail
          mkdir -p artifacts/lib

          MANIFEST="artifacts/dylibs-needed.txt"
          SEEN="$(mktemp)"
          : > "$MANIFEST"

          scan_binary() {
            local target="$1"

            [ -f "$target" ] || return 0
            grep -Fxq "$target" "$SEEN" && return 0
            echo "$target" >> "$SEEN"

            if ! file "$target" | grep -q 'Mach-O'; then
              return 0
            fi

            while IFS= read -r dep; do
              [ -n "$dep" ] || continue
              case "$dep" in
                /usr/lib/*|/System/*)
                  # Skip Apple-provided system libraries.
                  ;;
                @rpath/*|@loader_path/*|@executable_path/*)
                  # Keep unresolved loader paths in the manifest for visibility.
                  echo "$dep" >> "$MANIFEST"
                  ;;
                *)
                  echo "$dep" >> "$MANIFEST"
                  if [ -f "$dep" ]; then
                    cp -f "$dep" artifacts/lib/
                    scan_binary "$dep"
                  fi
                  ;;
              esac
            done < <(otool -L "$target" | tail -n +2 | awk '{print $1}')
          }

          scan_binary artifacts/ffmpeg
          scan_binary artifacts/ffprobe
          sort -u "$MANIFEST" -o "$MANIFEST"

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-build-logs
          path: failure-logs/
          if-no-files-found: warn

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-arm64
          path: artifacts/
