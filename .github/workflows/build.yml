name: Build FFmpeg (macOS ARM)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '17 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ffmpeg via ffmpeg-build-script
        run: |
          cd ffmpeg-build-script
          ./build-ffmpeg --enable-gpl-and-non-free --build --skip-install

      - name: Collect failure logs
        if: failure()
        run: |
          mkdir -p failure-logs
          find ffmpeg-build-script -name config.log -exec cp {} failure-logs/ \; || true
          if [ -d "ffmpeg-build-script/workspace" ]; then
            cp -R ffmpeg-build-script/workspace failure-logs/workspace
          fi

      - name: Verify build
        run: |
          ./ffmpeg-build-script/workspace/bin/ffmpeg -version
          ./ffmpeg-build-script/workspace/bin/ffprobe -version
          ./ffmpeg-build-script/workspace/bin/ffmpeg -buildconf

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp ./ffmpeg-build-script/workspace/bin/ffmpeg artifacts/
          cp ./ffmpeg-build-script/workspace/bin/ffprobe artifacts/

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-build-logs
          path: failure-logs/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-arm64
          path: artifacts/
          retention-days: 14
