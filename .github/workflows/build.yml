name: Build FFmpeg (macOS ARM)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '17 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew install pkg-config nasm yasm autoconf automake libtool cmake meson ninja python-setuptools rust

      - name: Build ffmpeg
        run: make -j$(sysctl -n hw.ncpu) NONFREE_AND_GPL=1

      - name: Collect failure logs
        if: failure()
        run: |
          mkdir -p failure-logs
          find . -name config.log -exec cp {} failure-logs/ \; || true
          if [ -d "workspace" ]; then
            cp -R workspace failure-logs/workspace
          fi

      - name: Verify build
        run: |
          ./workspace/bin/ffmpeg -version
          ./workspace/bin/ffprobe -version
          ./workspace/bin/ffmpeg -buildconf

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp ./workspace/bin/ffmpeg artifacts/
          cp ./workspace/bin/ffprobe artifacts/

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-build-logs
          path: failure-logs/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-arm64
          path: artifacts/
          retention-days: 14
